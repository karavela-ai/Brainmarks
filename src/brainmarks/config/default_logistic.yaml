# Root output directory
# Individual eval runs will be saved as:
#
#   output_root/{name_prefix}/{dataset}__{model}__{representation}__{classifier}
output_root: output
name_prefix: eval_logistic

# Remote root for backing up results
# currently only S3 supported
remote_root: null

# Description of the run
notes: null

# Model and dataset extra kwargs
model_kwargs: {}
dataset_kwargs: {}

# Data loader
num_workers: 16
batch_size: 64

# LogisticRegressionCV settings
cv_folds: 5
max_iter: 1000
Cs: 10  # number of regularization values to try (log-spaced)
# use class_weight='balanced' for imbalanced classes
balanced_sampling: true

# scoring metrics
metrics:
- acc
- f1
- bacc
- auc

# metric for CV selection (passed to LogisticRegressionCV scoring)
cv_metric: auc

# number of randomized split trials (0 to disable)
n_trials: 10

amp: true

device: cuda

seed: 4466
debug: false
